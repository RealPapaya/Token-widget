name: Build Windows Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build portable EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build portable EXE
        run: npm run dist:win

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-usage-widget-windows
          path: "Claude Usage Widget.exe"
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: "Claude Usage Widget.exe"
          generate_release_notes: true
          body: |
            Windows portable build for Claude Usage Widget.

            Download `Claude Usage Widget.exe` from Assets and run it directly on Windows.

            Windows SmartScreen may warn on first launch because this build is not code-signed yet. Use "More info" -> "Run anyway" only if you downloaded the file from this Release.
