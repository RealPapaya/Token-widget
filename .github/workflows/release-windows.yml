name: Build Windows Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build portable EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build portable EXE
        run: npm run dist:win

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-usage-widget-windows
          path: "usage widget.exe"
          if-no-files-found: error

      - name: Move latest tag
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest $env:GITHUB_SHA
          git push origin latest --force

      - name: Update latest GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Archive
          files: "usage widget.exe"
          overwrite_files: true
          make_latest: true
          body: |
            Automatic Windows portable build archive from the latest main/master commit.

            Download `usage widget.exe` from Assets and run it directly on Windows.

            Windows SmartScreen may warn on first launch because this build is not code-signed yet. Use "More info" -> "Run anyway" only if you downloaded the file from this Release.

      - name: Create versioned GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: "usage widget.exe"
          generate_release_notes: true
          body: |
            Windows portable build for Claude Usage Widget.

            Download `usage widget.exe` from Assets and run it directly on Windows.

            Windows SmartScreen may warn on first launch because this build is not code-signed yet. Use "More info" -> "Run anyway" only if you downloaded the file from this Release.
