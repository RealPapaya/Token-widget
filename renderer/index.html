<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
  <title>Claude Usage</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- expanded panel -->
  <div id="panel" class="panel hidden">
    <div class="header drag">
      <span class="logo" id="logo-expanded"></span>
      <span class="title">Your usage limits</span>
      <span class="header-buttons no-drag">
        <button id="btn-refresh" title="立即更新">&#x21bb;</button>
        <button id="btn-menu" title="設定">&#x22ef;</button>
        <button id="btn-collapse" title="縮小">&#x2013;</button>
      </span>
    </div>
    <div id="gauges"></div>
    <div class="footer drag">
      <span id="status-dot" class="dot"></span>
      <span id="status-text">載入中…</span>
    </div>
  </div>

  <!-- collapsed capsule -->
  <div id="capsule" class="capsule hidden drag">
    <span class="logo" id="logo-capsule"></span>
    <div class="capsule-body">
      <div class="capsule-bar"><div id="capsule-fill" class="fill"></div></div>
      <div class="capsule-text">
        <span id="capsule-pct">--%</span>
        <span id="capsule-reset" class="dim"></span>
      </div>
    </div>
    <button id="btn-expand" class="no-drag" title="展開">&#x2b;</button>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
