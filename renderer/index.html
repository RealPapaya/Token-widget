<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
  <title>Claude Usage</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- expanded panel -->
  <div id="panel" class="panel hidden">
    <div class="header drag">
      <span class="title">Token使用量</span>
      <span class="header-buttons no-drag">
        <button id="btn-refresh" data-tooltip="立即更新" aria-label="立即更新">&#x21bb;</button>
        <button id="btn-usage-details" data-tooltip="用量分析" aria-label="用量分析">&#37;</button>
        <button id="btn-settings" data-tooltip="設定" aria-label="設定">&#x2699;</button>
        <button id="btn-collapse" data-tooltip="縮小" aria-label="縮小">&#x2013;</button>
      </span>
    </div>
    <div id="gauges"></div>
    <div id="usage-view" class="usage-view hidden no-drag"></div>

    <!-- settings page (hidden by default) -->
    <div id="settings-view" class="settings hidden no-drag">
      <div class="set-group">
        <div class="set-row">
          <label class="set-label">自動更新頻率</label>
          <span id="poll-value" class="set-value">3 分鐘</span>
        </div>
        <input type="range" id="poll-slider" class="slider" min="1" max="60" step="1" value="3" />
        <div class="slider-scale"><span>1</span><span>60 分</span></div>
      </div>

      <div class="set-group">
        <div class="set-row">
          <label class="set-label" for="set-displayCurrency">金額顯示幣值</label>
          <select id="set-displayCurrency" class="set-select">
            <option value="USD">USD</option>
            <option value="TWD">TWD</option>
          </select>
        </div>
      </div>

      <div class="set-group">
        <label class="set-toggle" id="row-showClaude"><span>顯示 Claude 用量</span>
          <input type="checkbox" id="set-showClaude" /></label>
        <label class="set-toggle" id="row-showCodex"><span>顯示 Codex 用量</span>
          <input type="checkbox" id="set-showCodex" /></label>
        <label class="set-toggle"><span>顯示 Amber Ladder</span>
          <input type="checkbox" id="set-showAmberLadder" /></label>
        <label class="set-toggle"><span>用量警示通知</span>
          <input type="checkbox" id="set-notify" /></label>
        <label class="set-toggle"><span>永遠置頂</span>
          <input type="checkbox" id="set-alwaysOnTop" /></label>
        <label class="set-toggle"><span>開機自動啟動</span>
          <input type="checkbox" id="set-openAtLogin" /></label>
      </div>
    </div>

    <div class="footer drag">
      <span id="status-dot" class="dot"></span>
      <span id="status-text">載入中…</span>
    </div>
  </div>

  <!-- collapsed capsule -->
  <div id="capsule" class="capsule hidden drag">
    <div id="capsule-items" class="capsule-items"></div>
    <button id="btn-expand" class="no-drag" data-tooltip="展開" data-placement="left" aria-label="展開">&#x2b;</button>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
